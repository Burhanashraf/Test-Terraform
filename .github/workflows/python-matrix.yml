name: python lint

on:
 workflow_dispatch: 

jobs:
 validate:
    runs-on: ubuntu-latest
    steps:
      - name: checckout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-versions: "3.13"

      #Here we are only able to use one version of pythom
      
      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run linter
        run: flake8 app.py
         
    
        

name: Docker build and push
on:
 push:
   branches: [main]
jobs:
  Docker build and push:
  runs-on: ubuntu-latest
  steps:
      - name: checkout code
        uses: ctions/checkout@v4

      - name: Login to docker
        uses: docker/login-action@v3
        with:
        username: ${{ var.DOCKER_USERNAME }}
        password: ${{ secret.DOCKER_SECRET }}

      - name: Docker build and push to docker hub
        uses: docker/build-push-actions@v6
        with:
         context:
         push: true
         tags:
         ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
         ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
         ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
         

name: CI-CD
on:
  #this workflow_dispatch is for manually running of your pipeline user needs to run this pipeline which will be delivery
  workflow_dispatch:
   inputs:
    environment:
      description: This is the environment where we need to run our pipeline
      default: 'dev'
      required: true
      type: choice
      options:
        - dev
        - prod
        - staging
     
jobs:
  Clone:
    runs-on: ubuntu-latest
    steps:
       - name: clone the code
         run: echo "code cloned"
  Build:
     needs: [Clone]
     runs-on: ubuntu-latest
     steps:
       - name: run docker version
         run: docker --version
        
  Test:
      needs: [Build]
      runs-on: ubuntu-latest
      steps:
        - name: check if tf is installed
          run: 
           sudo apt update
           sudo apt install -y terraform
           terraform --version
  Deploy:
      needs: [Build,Test]
      runs-on: ubuntu-latest
      steps:
        - name: Done
          run: echo "completed"

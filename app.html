<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Flask App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f2937, #111827);
            color: #ffffff;
            text-align: center;
        }

        .container {
            margin-top: 10%;
        }

        h1 {
            font-size: 48px;
            color: #38bdf8;
        }

        p {
            font-size: 20px;
            color: #d1d5db;
        }

        .box {
            margin: 30px auto;
            padding: 20px;
            width: 60%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            margin-top: 15px;
            background: #22c55e;
            border-radius: 20px;
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 DevOps Flask Deployment</h1>

        <div class="box">
            <p>This application is deployed using:</p>
            <p><strong>Docker • GitHub Actions • AWS EC2 • Flask</strong></p>

            <div class="badge">Deployment Successful ✅</div>
        </div>

        <footer>
            Built for CI/CD Practice | Flask + Docker + DevOps Pipeline
        </footer>
    </div>

</body>
</html>
